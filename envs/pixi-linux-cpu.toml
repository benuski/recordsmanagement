[workspace]
authors = ["benuski <ben@amongotheritems.org>"]
name = "retention-harvest"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64"]

[dependencies]
pytorch = ">=2.10"
torchvision = "*"
beautifulsoup4 = ">=4.14.3,<5"
pandas = "*"

# Standard compatibility pins
libjpeg-turbo = { version = "*", channel = "conda-forge" }
virtualenv = ">=20.38.0,<21"
requests = ">=2.32.5,<3"
sodapy = ">=2.2.0,<3"
word2number = ">=1.1"
regex = { version = "<2025", channel = "conda-forge" }
pymupdf = ">=1.26.1,<2"

[pypi-dependencies]
marker-pdf = ">=1.10.0"
pdfplumber = ">=0.11.9, <0.12"
